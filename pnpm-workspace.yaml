# pnpm is used at time of writing only to create lockfile due to lack of Bun dependabot support
packages:
  - "workspaces/**/*"
  - "!workspaces/packages/pacwich/**/*"
  - "!workspaces/sandboxes/local-vs-release/**/*"
  - "!workspaces/sandboxes/**/*"

catalogs:
  pacwich-prod:
    "commander": 12.1.0
    "jiti": 2.7.0
    "semver": 7.8.0
    "shell-quote": 1.8.3
    "sucrase": 3.35.1
    "yaml": 2.9.0
