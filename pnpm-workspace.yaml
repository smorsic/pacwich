    "@rslib/core": ^0.21.2
    "@types/semver": ^7.7.1
    "@types/shell-quote": ^1.7.5
    "@xterm/headless": ^6.0.0
    "ajv": ^8.17.1
    "knip": ^6.15.0
    "dts-bundle-generator": ^9.5.1
    "vitest": ^4.1.6
  web:
    "@fontsource/unifontex": ^5.2.6
    "@rsbuild/plugin-svgr": ^1.3.1
    "@rspress/core": ^2.0.12
    "@rspress/plugin-client-redirects": ^2.0.12
    "@rspress/plugin-sitemap": ^2.0.12
    "@types/lodash": ^4.17.24
    "@types/react": ^19.2.15
    "@types/react-syntax-highlighter": ^15.5.13
    "lodash": ^4.18.1
