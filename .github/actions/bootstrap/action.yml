name: Bootstrap
description: Install tooling and dependencies

inputs:
  bun-version:
    description: Bun version (default = toolVersions.json bun.devLock)
    required: false
    default: ""
  node-version:
    description: Node version (default = toolVersions.json node.devLock)
    required: false
    default: ""
  pnpm-version:
    description: pnpm version (default = toolVersions.json pnpm.devLock)
    required: false
    default: ""

runs:
  using: composite
  steps:
    - id: versions
      name: Resolve tool versions
      shell: bash
      env:
        BUN_INPUT: ${{ inputs.bun-version }}
        NODE_INPUT: ${{ inputs.node-version }}
        PNPM_INPUT: ${{ inputs.pnpm-version }}
      run: |
        set -euo pipefail
        TV=workspaces/libraries/pacwich-common/toolVersions/toolVersions.json
        bun_v="${BUN_INPUT:-$(jq -r '.bun.devLock' "$TV")}"
        node_v="${NODE_INPUT:-$(jq -r '.node.devLock' "$TV")}"
        pnpm_v="${PNPM_INPUT:-$(jq -r '.pnpm.devLock' "$TV")}"
        {
          echo "bun=$bun_v"
          echo "node=$node_v"
          echo "pnpm=$pnpm_v"
        } >> "$GITHUB_OUTPUT"
        echo "Resolved versions: bun=$bun_v node=$node_v pnpm=$pnpm_v"

    - name: Install pnpm
      uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      with:
        version: ${{ steps.versions.outputs.pnpm }}
        run_install: false

    - name: Install Bun
      uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      with:
        bun-version: ${{ steps.versions.outputs.bun }}

    - name: Install Node
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: ${{ steps.versions.outputs.node }}

    - name: Install deps
      shell: bash
      run: |
        set -euo pipefail
        # Bun <1.3 doesn't read glob workspaces from package.json; expand them
        # before install so workspaces resolve on the older matrix legs.
        if bun --version | grep -q "^1.2."; then
          bun --eval '
            const pkg = "package.json";
            const json = JSON.parse(await Bun.file(pkg).text());
            json.workspaces.packages = [
              "workspaces/packages/*",
              "workspaces/meta",
              "workspaces/web/*",
              "workspaces/libraries/*"
            ];
            await Bun.write(pkg, `${JSON.stringify(json, null, 2)}\n`);
          '
          bun install --ignore-scripts
        else
          bun install --frozen-lockfile --ignore-scripts
        fi

    - name: Run prepare
      shell: bash
      run: bun prepare
