name: Test Given Versions

on:
  workflow_dispatch:
    inputs:
      test_runtime:
        required: true
        type: string
        default: node
      os:
        required: true
        type: choice
        options:
          - ubuntu-latest
          - windows-latest
          - macos-latest
      bun-version:
        required: true
        type: string
        default: "1.3"
      node-version:
        required: true
        type: string
        default: "26"
      pnpm-version:
        required: true
        type: string
        default: "11"
      test_args:
        required: false
        type: string
        default: ""
  workflow_call:
    inputs:
      test_runtime:
        required: true
        type: string
        default: node
      os:
        required: true
        type: string
      bun-version:
        required: true
        type: string
      node-version:
        required: true
        type: string
      pnpm-version:
        required: true
        type: string
      test_args:
        required: false
        type: string
        default: ""

jobs:
  test_given_versions:
    name: Test Build - ${{ inputs.test_runtime }} (bun ${{ inputs.bun-version }}, node ${{ inputs.node-version }}, pnpm ${{ inputs.pnpm-version }}, ${{ inputs.os }})
    runs-on: ${{ inputs.os }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: ./.github/actions/bootstrap
        with:
          bun-version: ${{ inputs.bun-version }}
          node-version: ${{ inputs.node-version }}
          pnpm-version: ${{ inputs.pnpm-version }}

      - name: Test Build - ${{ inputs.test_runtime }}
        shell: bash
        run: bun pw build-and-test:${{ inputs.test_runtime }} -- ${{ inputs.test_args }}
