name: Publish bun-workspaces to npm

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Dry run only (test publish)"
        required: false
        type: boolean
        default: false
      npm_tag:
        description: "npm dist-tag to publish under"
        required: false
        default: "next"

permissions:
  contents: read
  id-token: write # Required for OIDC

concurrency:
  group: publish-bun-workspaces
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: ${{ inputs.dry-run == true && 'bun-workspaces--test' || 'bun-workspaces--prod' }}
    env:
      NPM_TAG: ${{ inputs.npm_tag }}
      DRY_RUN: ${{ inputs.dry-run }}

    steps:
      - name: Checkout
        uses: ./.github/actions/checkout

      - name: Setup Project
        uses: ./.github/actions/setup

      - name: Run lint
        run: |
          set -euo pipefail
          bun bw lint

      - name: Run type-check
        run: |
          set -euo pipefail
          bun bw type-check

      - name: Run tests against build
        run: |
          set -euo pipefail
          bun bw:build:test

      - name: Build package
        run: |
          set -euo pipefail
          bun bw:build

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Publish to npm
        working-directory: workspaces/packages/bun-workspaces/dist
        shell: bash
        run: |
          set -euo pipefail

          echo "Publishing with dist-tag: ${NPM_TAG}"

          if [ "$DRY_RUN" = true ]; then
            echo "Dry run publish"
            npm publish --tag ${NPM_TAG} --dry-run
          else
            echo "Publishing"
            npm publish --tag ${NPM_TAG}
          fi

      - name: Create Summary
        id: create-summary
        run: |
          set -euo pipefail

          export RELEASE_VERSION=$(cat workspaces/packages/bun-workspaces/package.json | jq '.version' | tr -d '"')

          if [ "$DRY_RUN" = true ]; then
            echo "‼️ DRY RUN PUBLISH ONLY ‼️" >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "## 📦 🍔🍔👁️🍔🍔 bun-workspaces published" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Package: **bun-workspaces**" >> "$GITHUB_STEP_SUMMARY"
          echo "- Version: **$RELEASE_VERSION**" >> "$GITHUB_STEP_SUMMARY"
          echo "- npm tag: **$NPM_TAG**" >> "$GITHUB_STEP_SUMMARY"
          echo "- Commit: \`${GITHUB_SHA}\`" >> "$GITHUB_STEP_SUMMARY"

          RELEASE_URL=`bun run .github/scripts/createReleaseUrl.ts`

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Create a release: **$RELEASE_URL**" >> "$GITHUB_STEP_SUMMARY"

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Move to latest:" >> "$GITHUB_STEP_SUMMARY"
          echo "  - \`npm dist-tag add bun-workspaces@$RELEASE_VERSION latest\`" >> "$GITHUB_STEP_SUMMARY"
          echo "  - \`npm dist-tag rm bun-workspaces $NPM_TAG # optional\`" >> "$GITHUB_STEP_SUMMARY"
