name: Publish pacwich to npm

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Dry run only (test publish)"
        required: false
        type: boolean
        default: false
      npm_tag:
        description: "npm dist-tag to publish under"
        required: false
        default: "next"

permissions:
  contents: read
  id-token: write # Required for OIDC

concurrency:
  group: publish-pacwich
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: ${{ inputs.dry-run == true && 'pacwich--test' || 'pacwich--prod' }}
    env:
      NPM_TAG: ${{ inputs.npm_tag }}
      DRY_RUN: ${{ inputs.dry-run }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/actions/bootstrap

      - name: Run lint
        shell: bash
        run: bun lint

      - name: Run type-check
        shell: bash
        run: bun type-check

      - name: Run tests against build
        shell: bash
        run: |
          bun pw build-and-test:bun
          rm -rf workspaces/packages/pacwich/dist.test

      - name: Build package
        shell: bash
        run: bun pw build

      - name: Publish to npm
        shell: bash
        run: |
          cd workspaces/packages/pacwich/dist
          echo "Publishing with dist-tag: ${NPM_TAG}"

          if [ "$DRY_RUN" = true ]; then
            echo "Dry run publish"
            npm publish --tag "${NPM_TAG}" --dry-run
          else
            echo "Publishing"
            npm publish --tag "${NPM_TAG}"
          fi

      - name: Create Summary
        shell: bash
        run: |
          RELEASE_VERSION=$(jq -r '.version' workspaces/packages/pacwich/package.json)
          export RELEASE_VERSION

          if [ "$DRY_RUN" = true ]; then
            echo "‼️ DRY RUN PUBLISH ONLY ‼️" >> "$GITHUB_STEP_SUMMARY"
          fi

          {
            echo "## 📦 pacwich published"
            echo ""
            echo "- Package: **pacwich**"
            echo "- Version: **$RELEASE_VERSION**"
            echo "- npm tag: **$NPM_TAG**"
            echo "- Commit: \`${GITHUB_SHA}\`"
          } >> "$GITHUB_STEP_SUMMARY"

          RELEASE_URL=$(bun run workspaces/meta/ci/createReleaseUrl.ts)

          {
            echo ""
            echo "- Create a release: **$RELEASE_URL**"
            echo ""
            echo "Move to latest:"
            echo "  - \`npm dist-tag add pacwich@$RELEASE_VERSION latest\`"
            echo "  - \`npm dist-tag rm pacwich $NPM_TAG # optional\`"
          } >> "$GITHUB_STEP_SUMMARY"
