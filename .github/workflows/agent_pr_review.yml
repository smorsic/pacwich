name: Agent PR Review

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to review"
        required: true
        type: number

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: agent-review-${{ github.event.pull_request.number || inputs.pr_number }}
  cancel-in-progress: true

jobs:
  review:
    name: Claude Review
    runs-on: ubuntu-latest
    environment: agent-review
    timeout-minutes: 15
    # Skip fork PRs. They can't access secrets and will fail anyway
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/pull/{0}/head', inputs.pr_number) || '' }}
      - uses: anthropics/claude-code-action@558b1d6cab4085c7753fe402c10bef0fbb92ac7a # v1
        name: Run Claude Code
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }} # Token passed so GitHub app integration isn't needed
          prompt: |
            Act as a GitHub PR reviewer for PR #${{ github.event.pull_request.number || inputs.pr_number }}.
            Your job is not to describe a review, it is to POST one to the PR. You have not completed the
            task until exactly one PR comment has been posted.

            Steps:
            1. Get the diff with `gh pr diff ${{ github.event.pull_request.number || inputs.pr_number }}`.
            2. Inspect any relevant files with the Read, Grep, and Glob tools (not shell `cat`/`ls`).
            3. Review for bugs, security issues, and violations of the conventions in CLAUDE.md. Required
              documentation updates are described in the doc-updates skill at .agents/skills/doc-updates/SKILL.md
              that the author likely used, or should use, to make doc changes.
            4. REQUIRED FINAL STEP: post your review as exactly one comment with
              `gh pr comment ${{ github.event.pull_request.number || inputs.pr_number }} --body-file <file>`.
              Post it whether or not you found issues (if none, post a brief summary saying the review
              passed). Writing the review only as your reply does NOT count and leaves the task unfinished.
              Do not end the session until the comment is posted successfully.
              
            If no suggestions for change are needed, still at least post a PR comment summarizing your review.
          claude_args: >-
            --allowedTools "Read,Glob,Grep,Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr review:*),Bash(gh pr comment:*),Bash(git diff:*),Bash(git log:*)"
