name: Claude PR Review
on:
  pull_request:
    types: [opened] # not synchronize, to protect quota
permissions:
  contents: read
  pull-requests: write
jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@<sha> # pin
        with: { fetch-depth: 0 }
      - uses: anthropics/claude-code-action@<sha> # pin to a v1 release SHA
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Review this PR against the conventions in CLAUDE.md
            (coding style, security, testing, change workflow).
          claude_args: "--max-turns 6"
